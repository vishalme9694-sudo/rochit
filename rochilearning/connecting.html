<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    
    <!-- YEH LINE SABSE ZAROORI HAI: 3 second baad Telegram par bhejne ke liye -->
    <meta http-equiv="refresh" content="3;url=https://telegram.me/+ZpbqyAgUGKUxODc1">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #0088cc; /* Telegram blue color */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 25px;
            font-size: 18px;
            color: #444;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Loading Animation -->
    <div class="spinner"></div>
    
    <!-- User ko dikhne waala text -->
    <div class="loading-text">Connecting to the secure channel... Please wait.</div>

</body>
</html>
